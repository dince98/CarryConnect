<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarryConnect · Login & Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome 6 + fallback -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            background: #f8fafc;
            color: #1e293b;
        }
        
        .navbar {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%) !important;
            padding: 1rem 0;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        
        .navbar-brand {
            font-size: 28px !important;
            font-weight: 800 !important;
            color: white !important;
            letter-spacing: -0.5px;
        }
        
        .navbar-brand span {
            color: #3b82f6;
        }
        
        .nav-link {
            color: rgba(255,255,255,0.9) !important;
            font-weight: 600;
            margin: 0 5px;
            padding: 8px 16px !important;
            border-radius: 8px;
            transition: all 0.3s;
        }
        
        .nav-link:hover {
            background: rgba(59, 130, 246, 0.2);
            color: white !important;
        }
        
        .nav-link.active {
            background: #3b82f6 !important;
            color: white !important;
        }
        
        .dropdown-menu {
            background: #1e293b;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 8px;
            margin-top: 8px;
        }
        
        .dropdown-item {
            color: rgba(255,255,255,0.9);
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 8px;
            transition: all 0.3s;
        }
        
        .dropdown-item:hover {
            background: #3b82f6;
            color: white;
        }
        
        .dropdown-item i {
            width: 20px;
            margin-right: 10px;
            color: #3b82f6;
        }
        
        .dropdown-item:hover i {
            color: white;
        }
        
        .btn-account {
            border: 2px solid rgba(255,255,255,0.2);
            color: white !important;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-account:hover {
            background: rgba(59, 130, 246, 0.2);
        }
        
        /* ===== FULL PAGE AUTH BACKGROUND WITH VIPER.PNG ===== */
        .auth-page {
            background: 
                linear-gradient(135deg, rgba(0, 0, 0, 0.5) 0%, rgba(20, 10, 30, 0.6) 100%),
                url('viper.png') center center / cover no-repeat fixed;
            min-height: calc(100vh - 76px - 140px); /* fill space between navbar and footer */
            display: flex;
            align-items: center;
            padding: 40px 0;
        }
        
        .auth-card {
            border: none;
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(6px);
            padding: 30px 25px;
            width: 100%;
            border: 1px solid rgba(255,255,255,0.3);
        }
        
        /* keep the tabs and forms readable on light background */
        .auth-tabs {
            display: flex;
            border-bottom: 2px solid #eef2f6;
            margin-bottom: 25px;
        }
        
        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 15px 0;
            font-weight: 700;
            font-size: 18px;
            color: #64748b;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
        }
        
        .auth-tab.active {
            color: #667eea;
            border-bottom: 3px solid #667eea;
        }
        
        .auth-tab i {
            margin-right: 8px;
        }
        
        .form-control {
            border-radius: 16px;
            border: 1.5px solid #e2e8f0;
            padding: 12px 18px;
            font-family: 'Poppins', sans-serif;
        }
        
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102,126,234,0.1);
        }
        
        .btn-auth {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: 700;
            padding: 14px 20px;
            border-radius: 50px;
            font-size: 18px;
            border: none;
            width: 100%;
            transition: all 0.3s;
        }
        
        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(102,126,234,0.4);
        }
        
        .auth-footer {
            text-align: center;
            margin-top: 25px;
            color: #64748b;
        }
        
        .auth-footer a {
            color: #667eea;
            font-weight: 700;
            text-decoration: none;
        }
        /* =================================================== */
        
        footer {
            background: #0f172a;
            color: white;
            padding: 30px 0;
            text-align: center;
        }
        
        .footer-logo {
            font-size: 24px;
            font-weight: 800;
            color: white;
            text-decoration: none;
        }
        
        .footer-logo span {
            color: #667eea;
        }
        
        .copyright {
            margin-top: 20px;
            color: rgba(255,255,255,0.5);
            font-size: 14px;
        }
        
        @media (max-width: 768px) {
            .auth-card { padding: 20px 15px; }
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="index.html">
            <span>Carry</span>Connect
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="index.html">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="HowItWorks.html">How It Works</a>
                </li>
                <li class="nav-item dropdown">
                    <a class="nav-link btn-account dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="fas fa-user-circle"></i> <span id="accountText">Account</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end" id="accountDropdown">
                        <!-- Will be populated by JavaScript -->
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Entire auth section with viper.png background (replaces blue/white) -->
<div class="auth-page">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6 col-md-8">
                <div class="auth-card">
                    
                    <div class="auth-tabs">
                        <div class="auth-tab active" id="loginTabBtn" onclick="switchTab('login')">
                            <i class="fas fa-key"></i> Login
                        </div>
                        <div class="auth-tab" id="registerTabBtn" onclick="switchTab('register')">
                            <i class="fas fa-user-plus"></i> Sign Up
                        </div>
                    </div>

                    <!-- LOGIN FORM -->
                    <div id="loginForm" class="tab-pane" style="display: block;">
                        <form id="loginFormElement">
                            <div class="mb-3">
                                <label class="form-label">Username or Email</label>
                                <input type="text" class="form-control" name="username" placeholder="your@email.com or username" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <input type="password" class="form-control" name="password" placeholder="••••••••" required>
                            </div>
                            
                            <div class="mb-4"></div>
                            
                            <button type="submit" class="btn btn-auth">Log in</button>
                        </form>
                        <div class="auth-footer">
                            New here? <a href="#" onclick="switchTab('register'); return false;">Create an account</a>
                        </div>
                    </div>

                    <!-- REGISTER FORM -->
                    <div id="registerForm" class="tab-pane" style="display: none;">
                        <form id="registerFormElement">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">First name</label>
                                    <input type="text" class="form-control" name="firstName" placeholder="John" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Last name</label>
                                    <input type="text" class="form-control" name="lastName" placeholder="Doe" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" name="email" placeholder="you@example.com" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Username</label>
                                <input type="text" class="form-control" name="username" placeholder="carrymaster" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <input type="password" class="form-control" name="password" placeholder="Create a password" required>
                                <small class="text-muted">Min. 8 characters</small>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Confirm password</label>
                                <input type="password" class="form-control" name="confirmPassword" placeholder="Re-enter password" required>
                            </div>
                            <div class="form-check mb-4">
                                <input class="form-check-input" type="checkbox" id="agreeTerms" required>
                                <label class="form-check-label text-muted">
                                    I agree to the <a href="terms.html" style="color: #667eea;">Terms</a>
                                </label>
                            </div>
                            <button type="submit" class="btn btn-auth">Sign up</button>
                        </form>
                        <div class="auth-footer">
                            Already have an account? <a href="#" onclick="switchTab('login'); return false;">Sign in</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer>
    <div class="container">
        <a href="index.html" class="footer-logo">
            <span>Carry</span>Connect
        </a>
        <div class="copyright">
            <p>© 2026 CarryConnect · An indie boosting collective</p>
        </div>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.min.js"></script>
<script>
    const SUPABASE_URL = 'https://aozhkwvoqnyktsgrdtnw.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFvemhrd3ZvcW55a3RzZ3JkdG53Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MjU2NTA1NiwiZXhwIjoyMDg4MTQxMDU2fQ.lbr0-PCymnj241Vwso6yJYzch7HOJ5utB-pPsWpkABc';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    async function handleRegister(event) {
        event.preventDefault();
        
        const form = event.target;
        const password = form.password.value;
        const confirmPassword = form.confirmPassword.value;
        
        if (password !== confirmPassword) {
            alert('❌ Passwords do not match!');
            return;
        }
        
        const userData = {
            username: form.username.value,
            email: form.email.value,
            password: password,
            first_name: form.firstName.value,
            last_name: form.lastName.value,
            role: 'client'
        };
        
        try {
            const response = await fetch(`${SUPABASE_URL}/rest/v1/users`, {
                method: 'POST',
                headers: {
                    'apikey': SUPABASE_KEY,
                    'Authorization': `Bearer ${SUPABASE_KEY}`,
                    'Content-Type': 'application/json',
                    'Prefer': 'return=minimal'
                },
                body: JSON.stringify(userData)
            });
            
            if (response.ok) {
                alert('✅ Registration successful! Please login.');
                switchTab('login');
                form.reset();
            } else {
                const error = await response.json();
                alert('❌ Registration failed: ' + (error.message || 'Unknown error'));
            }
        } catch (error) {
            alert('❌ Error: ' + error.message);
        }
    }
    
    async function handleLogin(event) {
        event.preventDefault();
        
        const form = event.target;
        const username = form.username.value;
        const password = form.password.value;
        
        try {
            const response = await fetch(
                `${SUPABASE_URL}/rest/v1/users?or=(username.eq.${username},email.eq.${username})`,
                {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                }
            );
            
            const users = await response.json();
            
            if (users.length > 0) {
                if (users[0].password === password) {
                    alert('✅ Login successful!');
                    
                    sessionStorage.setItem('userId', users[0].user_id);
                    sessionStorage.setItem('username', users[0].username);
                    sessionStorage.setItem('role', users[0].role);
                    
                    window.location.href = `Games.html?loggedin=true&user_id=${users[0].user_id}&username=${users[0].username}&role=${users[0].role}`;
                } else {
                    alert('❌ Invalid password');
                }
            } else {
                alert('❌ User not found');
            }
        } catch (error) {
            alert('❌ Error: ' + error.message);
        }
    }
    
    function switchTab(tab) {
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const loginTab = document.getElementById('loginTabBtn');
        const registerTab = document.getElementById('registerTabBtn');
        
        if (tab === 'login') {
            loginForm.style.display = 'block';
            registerForm.style.display = 'none';
            loginTab.classList.add('active');
            registerTab.classList.remove('active');
        } else {
            loginForm.style.display = 'none';
            registerForm.style.display = 'block';
            registerTab.classList.add('active');
            loginTab.classList.remove('active');
        }
    }
    
    function updateNavbar() {
        const dropdown = document.getElementById('accountDropdown');
        const accountText = document.getElementById('accountText');
        const userId = sessionStorage.getItem('userId');
        const username = sessionStorage.getItem('username');
        const role = sessionStorage.getItem('role');

        if (userId) {
            accountText.textContent = username;
            
            let menuItems = `
                <li><a class="dropdown-item" href="Games.html"><i class="fas fa-gamepad"></i> Games</a></li>
                <li><a class="dropdown-item" href="Orders.html"><i class="fas fa-shopping-bag"></i> My Orders</a></li>
            `;

            if (role === 'booster') {
                menuItems += `
                    <li><a class="dropdown-item" href="Booster.html"><i class="fas fa-bolt"></i> Booster Dashboard</a></li>
                `;
            }

            if (role === 'admin') {
                menuItems += `
                    <li><a class="dropdown-item" href="admin.html"><i class="fas fa-cog"></i> Admin Panel</a></li>
                `;
            }

            menuItems += `
                <li><hr class="dropdown-divider"></li>
                <li><a class="dropdown-item" href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            `;

            dropdown.innerHTML = menuItems;
        } else {
            accountText.textContent = 'Account';
            dropdown.innerHTML = `
                <li><a class="dropdown-item" href="LoginAndRegister.html?tab=login"><i class="fas fa-key"></i> Login</a></li>
                <li><a class="dropdown-item" href="LoginAndRegister.html?tab=register"><i class="fas fa-user-plus"></i> Sign Up</a></li>
            `;
        }
    }
    
    window.onload = function() {
        updateNavbar();
        
        const urlParams = new URLSearchParams(window.location.search);
        const tab = urlParams.get('tab');
        
        if (tab === 'register') {
            switchTab('register');
        } else {
            switchTab('login');
        }
    };
    
    function logout() {
        sessionStorage.clear();
        window.location.href = 'index.html';
    }
    
    document.addEventListener('DOMContentLoaded', function() {
        const loginForm = document.getElementById('loginFormElement');
        const registerForm = document.getElementById('registerFormElement');
        
        if (loginForm) loginForm.onsubmit = handleLogin;
        if (registerForm) registerForm.onsubmit = handleRegister;
    });
</script>

</body>
</html>
