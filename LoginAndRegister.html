<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarryConnect · Login & Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            background: #f8fafc;
            color: #1e293b;
        }
        
        .navbar {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%) !important;
            padding: 1rem 0;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        
        .navbar-brand {
            font-size: 28px !important;
            font-weight: 800 !important;
            color: white !important;
            letter-spacing: -0.5px;
        }
        
        .navbar-brand span {
            color: #3b82f6;
        }
        
        .nav-link {
            color: rgba(255,255,255,0.9) !important;
            font-weight: 600;
            margin: 0 5px;
            padding: 8px 16px !important;
            border-radius: 8px;
            transition: all 0.3s;
        }
        
        .nav-link:hover {
            background: rgba(59, 130, 246, 0.2);
            color: white !important;
        }
        
        .nav-link.active {
            background: #3b82f6 !important;
            color: white !important;
        }
        
        .dropdown-menu {
            background: #1e293b;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 8px;
            margin-top: 8px;
        }
        
        .dropdown-item {
            color: rgba(255,255,255,0.9);
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 8px;
            transition: all 0.3s;
        }
        
        .dropdown-item:hover {
            background: #3b82f6;
            color: white;
        }
        
        .dropdown-item i {
            width: 20px;
            margin-right: 10px;
            color: #3b82f6;
        }
        
        .dropdown-item:hover i {
            color: white;
        }
        
        .btn-account {
            border: 2px solid rgba(255,255,255,0.2);
            color: white !important;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-account:hover {
            background: rgba(59, 130, 246, 0.2);
        }
        
        .auth-hero {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 60px 0 80px;
            text-align: center;
        }
        
        .auth-hero h1 {
            font-size: 40px;
            font-weight: 800;
        }
        
        .auth-card {
            border: none;
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            background: white;
            padding: 30px 25px;
            margin-top: -60px;
            margin-bottom: 60px;
        }
        
        .auth-tabs {
            display: flex;
            border-bottom: 2px solid #eef2f6;
            margin-bottom: 25px;
        }
        
        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 15px 0;
            font-weight: 700;
            font-size: 18px;
            color: #64748b;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
        }
        
        .auth-tab.active {
            color: #667eea;
            border-bottom: 3px solid #667eea;
        }
        
        .auth-tab i {
            margin-right: 8px;
        }
        
        .form-control {
            border-radius: 16px;
            border: 1.5px solid #e2e8f0;
            padding: 12px 18px;
            font-family: 'Poppins', sans-serif;
        }
        
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102,126,234,0.1);
        }
        
        .btn-auth {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: 700;
            padding: 14px 20px;
            border-radius: 50px;
            font-size: 18px;
            border: none;
            width: 100%;
            transition: all 0.3s;
        }
        
        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(102,126,234,0.4);
        }
        
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: #94a3b8;
            margin: 25px 0;
        }
        
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e2e8f0;
        }
        
        .divider span {
            margin: 0 10px;
            font-size: 14px;
        }
        
        .social-btn {
            border-radius: 50px;
            padding: 12px;
            font-weight: 600;
            border: 1.5px solid #e2e8f0;
            background: white;
            color: #1e293b;
            transition: all 0.2s;
        }
        
        .social-btn:hover {
            background: #f8fafc;
            border-color: #94a3b8;
        }
        
        .auth-footer {
            text-align: center;
            margin-top: 25px;
            color: #64748b;
        }
        
        .auth-footer a {
            color: #667eea;
            font-weight: 700;
            text-decoration: none;
        }
        
        footer {
            background: #0f172a;
            color: white;
            padding: 30px 0;
            text-align: center;
        }
        
        .footer-logo {
            font-size: 24px;
            font-weight: 800;
            color: white;
            text-decoration: none;
        }
        
        .footer-logo span {
            color: #667eea;
        }
        
        .copyright {
            margin-top: 20px;
            color: rgba(255,255,255,0.5);
            font-size: 14px;
        }
        
        @media (max-width: 768px) {
            .auth-hero h1 { font-size: 28px; }
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="index.html">
            <span>Carry</span>Connect
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="index.html">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="HowItWorks.html">How It Works</a>
                </li>
                <li class="nav-item dropdown">
                    <a class="nav-link btn-account dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="fas fa-user-circle"></i> <span id="accountText">Account</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end" id="accountDropdown">
                        <!-- Will be populated by JavaScript -->
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

<section class="auth-hero">
    <div class="container">
        <h1>Welcome to CarryConnect</h1>
        <p class="lead">Login or create an account</p>
    </div>
</section>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8">
            <div class="auth-card">
                
                <div class="auth-tabs">
                    <div class="auth-tab active" id="loginTabBtn" onclick="switchTab('login')">
                        <i class="fas fa-key"></i> Login
                    </div>
                    <div class="auth-tab" id="registerTabBtn" onclick="switchTab('register')">
                        <i class="fas fa-user-plus"></i> Sign Up
                    </div>
                </div>

                <div id="loginForm" class="tab-pane" style="display: block;">
                    <form id="loginFormElement">
                        <div class="mb-3">
                            <label class="form-label">Username or Email</label>
                            <input type="text" class="form-control" name="username" placeholder="your@email.com or username" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control" name="password" placeholder="••••••••" required>
                        </div>
                        <div class="d-flex justify-content-between mb-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="rememberMe">
                                <label class="form-check-label text-muted">Remember me</label>
                            </div>
                            <a href="#" class="text-decoration-none" style="color: #667eea;">Forgot password?</a>
                        </div>
                        <button type="submit" class="btn btn-auth">Log in</button>
                    </form>
                    <div class="auth-footer">
                        New here? <a href="#" onclick="switchTab('register'); return false;">Create an account</a>
                    </div>
                </div>

                <div id="registerForm" class="tab-pane" style="display: none;">
                    <form id="registerFormElement">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">First name</label>
                                <input type="text" class="form-control" name="firstName" placeholder="John" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Last name</label>
                                <input type="text" class="form-control" name="lastName" placeholder="Doe" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" name="email" placeholder="you@example.com" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" class="form-control" name="username" placeholder="carrymaster" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control" name="password" placeholder="Create a password" required>
                            <small class="text-muted">Min. 8 characters</small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Confirm password</label>
                            <input type="password" class="form-control" name="confirmPassword" placeholder="Re-enter password" required>
                        </div>
                        <div class="form-check mb-4">
                            <input class="form-check-input" type="checkbox" id="agreeTerms" required>
                            <label class="form-check-label text-muted">
                                I agree to the <a href="terms.html" style="color: #667eea;">Terms</a>
                            </label>
                        </div>
                        <button type="submit" class="btn btn-auth">Sign up</button>
                    </form>
                    <div class="auth-footer">
                        Already have an account? <a href="#" onclick="switchTab('login'); return false;">Sign in</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer>
    <div class="container">
        <a href="index.html" class="footer-logo">
            <span>Carry</span>Connect
        </a>
        <div class="copyright">
            <p>© 2026 CarryConnect · An indie boosting collective</p>
        </div>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // Supabase configuration
    const SUPABASE_URL = 'https://aozhkwvoqnyktsgrdtnw.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFvemhrd3ZvcW55a3RzZ3JkdG53Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NjUwNTYsImV4cCI6MjA4ODE0MTA1Nn0.-TjxEU-Qs0gPcO3h80wj0sRI37c6tT8FvTAyqteWqLc';
    
    // Function to handle registration
    async function handleRegister(event) {
        event.preventDefault();
        
        const form = event.target;
        const password = form.password.value;
        const confirmPassword = form.confirmPassword.value;
        
        // Check if passwords match
        if (password !== confirmPassword) {
            alert('❌ Passwords do not match!');
            return;
        }
        
        const userData = {
            username: form.username.value,
            email: form.email.value,
            password: password,
            first_name: form.firstName.value,
            last_name: form.lastName.value,
            role: 'client'
        };
        
        try {
            const response = await fetch(`${SUPABASE_URL}/rest/v1/users`, {
                method: 'POST',
                headers: {
                    'apikey': SUPABASE_KEY,
                    'Authorization': `Bearer ${SUPABASE_KEY}`,
                    'Content-Type': 'application/json',
                    'Prefer': 'return=minimal'
                },
                body: JSON.stringify(userData)
            });
            
            if (response.ok) {
                alert('✅ Registration successful! Please login.');
                switchTab('login');
                form.reset();
            } else {
                const error = await response.json();
                alert('❌ Registration failed: ' + (error.message || 'Unknown error'));
            }
        } catch (error) {
            alert('❌ Error: ' + error.message);
        }
    }
    
    // Function to handle login
    async function handleLogin(event) {
        event.preventDefault();
        
        const form = event.target;
        const username = form.username.value;
        const password = form.password.value;
        
        try {
            // Check if user exists with matching username/email and password
            const response = await fetch(
                `${SUPABASE_URL}/rest/v1/users?or=(username.eq.${username},email.eq.${username})&password.eq.${password}`,
                {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                }
            );
            
            const users = await response.json();
            
            if (users.length > 0) {
                alert('✅ Login successful!');
                // Save user info to session
                sessionStorage.setItem('userId', users[0].user_id);
                sessionStorage.setItem('username', users[0].username);
                sessionStorage.setItem('role', users[0].role);
                
                window.location.href = 'Games.html?loggedin=true';
            } else {
                alert('❌ Invalid username or password');
            }
        } catch (error) {
            alert('❌ Error: ' + error.message);
        }
    }
    
    // Function to switch tabs
    function switchTab(tab) {
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const loginTab = document.getElementById('loginTabBtn');
        const registerTab = document.getElementById('registerTabBtn');
        
        if (tab === 'login') {
            loginForm.style.display = 'block';
            registerForm.style.display = 'none';
            loginTab.classList.add('active');
            registerTab.classList.remove('active');
        } else {
            loginForm.style.display = 'none';
            registerForm.style.display = 'block';
            registerTab.classList.add('active');
            loginTab.classList.remove('active');
        }
    }
    
    // Initialize on page load
    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const tab = urlParams.get('tab');
        
        if (tab === 'register') {
            switchTab('register');
        } else {
            switchTab('login');
        }
        
        // Update account dropdown based on login status
        const dropdown = document.getElementById('accountDropdown');
        const accountText = document.getElementById('accountText');
        
        if (sessionStorage.getItem('userId')) {
            // User is logged in
            accountText.textContent = sessionStorage.getItem('username');
            dropdown.innerHTML = `
                <li><a class="dropdown-item" href="#"><i class="fas fa-user"></i> Profile</a></li>
                <li><a class="dropdown-item" href="#"><i class="fas fa-shopping-bag"></i> My Orders</a></li>
                <li><hr class="dropdown-divider"></li>
                <li><a class="dropdown-item" href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            `;
        } else {
            // User is not logged in
            accountText.textContent = 'Account';
            dropdown.innerHTML = `
                <li><a class="dropdown-item" href="LoginAndRegister.html?tab=login"><i class="fas fa-key"></i> Login</a></li>
                <li><a class="dropdown-item" href="LoginAndRegister.html?tab=register"><i class="fas fa-user-plus"></i> Sign Up</a></li>
            `;
        }
    };
    
    // Logout function
    function logout() {
        sessionStorage.clear();
        window.location.href = 'index.html';
    }
    
    // Attach form handlers
    document.addEventListener('DOMContentLoaded', function() {
        const loginForm = document.getElementById('loginFormElement');
        const registerForm = document.getElementById('registerFormElement');
        
        if (loginForm) loginForm.onsubmit = handleLogin;
        if (registerForm) registerForm.onsubmit = handleRegister;
    });
</script>

</body>
</html>
