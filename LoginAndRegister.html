<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarryConnect · Login & Register</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- bcrypt for password hashing -->

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            background: #f8fafc;
            color: #1e293b;
        }
        
        .navbar {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%) !important;
            padding: 1rem 0;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        
        .navbar-brand {
            font-size: 28px !important;
            font-weight: 800 !important;
            color: white !important;
            letter-spacing: -0.5px;
        }
        
        .navbar-brand span {
            color: #3b82f6;
        }
        
        .nav-link {
            color: rgba(255,255,255,0.9) !important;
            font-weight: 600;
            margin: 0 5px;
            padding: 8px 16px !important;
            border-radius: 8px;
            transition: all 0.3s;
        }
        
        .nav-link:hover {
            background: rgba(59, 130, 246, 0.2);
            color: white !important;
        }
        
        .nav-link.active {
            background: #3b82f6 !important;
            color: white !important;
        }
        
        .dropdown-menu {
            background: #1e293b;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 8px;
            margin-top: 8px;
        }
        
        .dropdown-item {
            color: rgba(255,255,255,0.9);
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 8px;
            transition: all 0.3s;
        }
        
        .dropdown-item:hover {
            background: #3b82f6;
            color: white;
        }
        
        .dropdown-item i {
            width: 20px;
            margin-right: 10px;
            color: #3b82f6;
        }
        
        .dropdown-item:hover i {
            color: white;
        }
        
        .btn-account {
            border: 2px solid rgba(255,255,255,0.2);
            color: white !important;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-account:hover {
            background: rgba(59, 130, 246, 0.2);
        }
        
        /* ===== FULL PAGE AUTH BACKGROUND WITH VIPER.PNG ===== */
        .auth-page {
            background: 
                linear-gradient(135deg, rgba(0, 0, 0, 0.5) 0%, rgba(20, 10, 30, 0.6) 100%),
                url('viper.png') center center / cover no-repeat fixed;
            min-height: calc(100vh - 76px - 140px);
            display: flex;
            align-items: center;
            padding: 40px 0;
        }
        
        .auth-card {
            border: none;
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(6px);
            padding: 30px 25px;
            width: 100%;
            border: 1px solid rgba(255,255,255,0.3);
        }
        
        .auth-tabs {
            display: flex;
            border-bottom: 2px solid #eef2f6;
            margin-bottom: 25px;
        }
        
        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 15px 0;
            font-weight: 700;
            font-size: 18px;
            color: #64748b;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
        }
        
        .auth-tab.active {
            color: #667eea;
            border-bottom: 3px solid #667eea;
        }
        
        .auth-tab i {
            margin-right: 8px;
        }
        
        .form-control {
            border-radius: 16px;
            border: 1.5px solid #e2e8f0;
            padding: 12px 18px;
            font-family: 'Poppins', sans-serif;
        }
        
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102,126,234,0.1);
        }
        
        /* Validation Styles */
        .form-control.is-valid {
            border-color: #28a745;
        }
        
        .form-control.is-invalid {
            border-color: #dc3545;
        }
        
        /* Password wrapper for toggle button */
        .password-wrapper {
            position: relative;
        }
        
        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #64748b;
            z-index: 10;
        }
        
        .password-toggle:hover {
            color: #667eea;
        }
        
        /* Validation messages */
        .validation-feedback {
            font-size: 12px;
            margin-top: 5px;
        }
        
        .validation-feedback small {
            display: block;
            margin-bottom: 2px;
        }
        
        .text-success {
            color: #28a745 !important;
        }
        
        .text-danger {
            color: #dc3545 !important;
        }
        
        /* Password strength bar */
        .password-strength {
            height: 4px;
            border-radius: 2px;
            background: #e2e8f0;
            margin-top: 8px;
            overflow: hidden;
        }
        
        .strength-bar {
            height: 100%;
            width: 0;
            transition: all 0.3s;
        }
        
        .strength-bar.weak {
            width: 25%;
            background: #dc3545;
        }
        
        .strength-bar.medium {
            width: 50%;
            background: #ffc107;
        }
        
        .strength-bar.strong {
            width: 75%;
            background: #28a745;
        }
        
        .strength-bar.very-strong {
            width: 100%;
            background: #20c997;
        }
        
        /* Tooltip notification */
        .tooltip-message {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            border-radius: 12px;
            padding: 12px 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            border-left: 4px solid #667eea;
            z-index: 9999;
            animation: slideIn 0.3s ease;
            font-size: 14px;
        }
        
        .tooltip-message.error {
            border-left-color: #dc3545;
        }
        
        .tooltip-message.success {
            border-left-color: #28a745;
        }
        
        .tooltip-message.warning {
            border-left-color: #ffc107;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        .btn-auth {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: 700;
            padding: 14px 20px;
            border-radius: 50px;
            font-size: 18px;
            border: none;
            width: 100%;
            transition: all 0.3s;
        }
        
        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(102,126,234,0.4);
        }
        
        .btn-auth:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .auth-footer {
            text-align: center;
            margin-top: 25px;
            color: #64748b;
        }
        
        .auth-footer a {
            color: #667eea;
            font-weight: 700;
            text-decoration: none;
        }
        
        footer {
            background: #0f172a;
            color: white;
            padding: 30px 0;
            text-align: center;
        }
        
        .footer-logo {
            font-size: 24px;
            font-weight: 800;
            color: white;
            text-decoration: none;
        }
        
        .footer-logo span {
            color: #667eea;
        }
        
        .copyright {
            margin-top: 20px;
            color: rgba(255,255,255,0.5);
            font-size: 14px;
        }
        
        @media (max-width: 768px) {
            .auth-card { padding: 20px 15px; }
        }
    </style>
</head>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.min.js"></script>
<script>
    const SUPABASE_URL = 'https://aozhkwvoqnyktsgrdtnw.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFvemhrd3ZvcW55a3RzZ3JkdG53Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MjU2NTA1NiwiZXhwIjoyMDg4MTQxMDU2fQ.lbr0-PCymnj241Vwso6yJYzch7HOJ5utB-pPsWpkABc';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    // ========== TOOLTIP FUNCTION ==========
    function showTooltip(message, type = 'error') {
        const container = document.getElementById('tooltipContainer');
        const tooltipId = 'tooltip-' + Date.now();
        
        const icon = type === 'error' ? 'fa-exclamation-circle' : 
                    type === 'success' ? 'fa-check-circle' : 'fa-exclamation-triangle';
        
        const html = `
            <div id="${tooltipId}" class="tooltip-message ${type}">
                <i class="fas ${icon}"></i> ${message}
            </div>
        `;
        
        container.insertAdjacentHTML('beforeend', html);
        
        setTimeout(() => {
            const tooltip = document.getElementById(tooltipId);
            if (tooltip) tooltip.remove();
        }, 5000);
    }
    
    // ========== TOGGLE PASSWORD VISIBILITY ==========
    function togglePassword(inputId) {
        const input = document.getElementById(inputId);
        const icon = input.nextElementSibling;
        
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        }
    }
    
    // ========== USERNAME VALIDATION (letters only) ==========
    function validateUsername() {
        const username = document.getElementById('regUsername').value;
        const input = document.getElementById('regUsername');
        const feedback = document.getElementById('usernameFeedback');
        
        const lettersOnlyRegex = /^[A-Za-z]+$/;
        
        if (username.length === 0) {
            input.classList.remove('is-valid', 'is-invalid');
            feedback.innerHTML = '';
            return false;
        }
        
        if (!lettersOnlyRegex.test(username)) {
            input.classList.add('is-invalid');
            input.classList.remove('is-valid');
            feedback.innerHTML = '<small class="text-danger"><i class="fas fa-times-circle"></i> Letters only - no numbers or symbols allowed</small>';
            showTooltip('Username can only contain letters (a-z, A-Z)', 'warning');
            return false;
        } else {
            input.classList.add('is-valid');
            input.classList.remove('is-invalid');
            feedback.innerHTML = '<small class="text-success"><i class="fas fa-check-circle"></i> Username available</small>';
            return true;
        }
    }
    
    // ========== PASSWORD VALIDATION (all requirements) ==========
    function validatePassword() {
        const password = document.getElementById('regPassword').value;
        const input = document.getElementById('regPassword');
        const strengthBar = document.getElementById('strengthBar');
        
        const hasLength = password.length >= 8;
        const hasLower = /[a-z]/.test(password);
        const hasUpper = /[A-Z]/.test(password);
        const hasNumber = /[0-9]/.test(password);
        const hasSymbol = /[!@#$%^&*(),.?":{}|<>]/.test(password);
        
        // Update requirement icons
        updateRequirementIcon('reqLength', hasLength);
        updateRequirementIcon('reqLower', hasLower);
        updateRequirementIcon('reqUpper', hasUpper);
        updateRequirementIcon('reqNumber', hasNumber);
        updateRequirementIcon('reqSymbol', hasSymbol);
        
        // Update strength bar
        const strengthCount = [hasLength, hasLower, hasUpper, hasNumber, hasSymbol].filter(Boolean).length;
        strengthBar.className = 'strength-bar';
        if (strengthCount <= 2) strengthBar.classList.add('weak');
        else if (strengthCount === 3) strengthBar.classList.add('medium');
        else if (strengthCount === 4) strengthBar.classList.add('strong');
        else if (strengthCount === 5) strengthBar.classList.add('very-strong');
        
        // Update input validation
        if (password.length > 0) {
            if (hasLength && hasLower && hasUpper && hasNumber && hasSymbol) {
                input.classList.add('is-valid');
                input.classList.remove('is-invalid');
                return true;
            } else {
                input.classList.add('is-invalid');
                input.classList.remove('is-valid');
                
                // Show specific tooltips for missing requirements
                if (!hasLength) showTooltip('Password must be at least 8 characters', 'warning');
                else if (!hasLower) showTooltip('Password needs a lowercase letter (a-z)', 'warning');
                else if (!hasUpper) showTooltip('Password needs an UPPERCASE letter (A-Z)', 'warning');
                else if (!hasNumber) showTooltip('Password needs a number (0-9)', 'warning');
                else if (!hasSymbol) showTooltip('Password needs a symbol (!@#$%^&*)', 'warning');
                
                return false;
            }
        } else {
            input.classList.remove('is-valid', 'is-invalid');
            return false;
        }
    }
    
    function updateRequirementIcon(elementId, isValid) {
        const element = document.getElementById(elementId);
        const text = element.innerHTML.replace(/<i.*?>.*?<\/i>/, '').trim();
        
        if (isValid) {
            element.innerHTML = `<i class="fas fa-check-circle text-success"></i> ${text}`;
        } else {
            element.innerHTML = `<i class="fas fa-circle text-muted"></i> ${text}`;
        }
    }
    
    // ========== CONFIRM PASSWORD VALIDATION ==========
    function validateConfirmPassword() {
        const password = document.getElementById('regPassword').value;
        const confirm = document.getElementById('regConfirmPassword').value;
        const input = document.getElementById('regConfirmPassword');
        const feedback = document.getElementById('confirmPasswordFeedback');
        
        if (confirm.length === 0) {
            input.classList.remove('is-valid', 'is-invalid');
            feedback.innerHTML = '';
            return false;
        }
        
        if (password !== confirm) {
            input.classList.add('is-invalid');
            input.classList.remove('is-valid');
            feedback.innerHTML = '<small class="text-danger"><i class="fas fa-times-circle"></i> Passwords do not match</small>';
            showTooltip('Passwords do not match!', 'error');
            return false;
        } else {
            input.classList.add('is-valid');
            input.classList.remove('is-invalid');
            feedback.innerHTML = '<small class="text-success"><i class="fas fa-check-circle"></i> Passwords match</small>';
            return true;
        }
    }
    
    // ========== CHECK REGISTER BUTTON STATE ==========
    function checkRegisterButton() {
        const firstName = document.getElementById('regFirstName').value;
        const lastName = document.getElementById('regLastName').value;
        const email = document.getElementById('regEmail').value;
        const isUsernameValid = validateUsername();
        const isPasswordValid = validatePassword();
        const isConfirmValid = validateConfirmPassword();
        const isTermsChecked = document.getElementById('agreeTerms').checked;
        
        const btn = document.getElementById('registerBtn');
        
        if (firstName && lastName && email && isUsernameValid && isPasswordValid && isConfirmValid && isTermsChecked) {
            btn.disabled = false;
        } else {
            btn.disabled = true;
        }
    }
    
    // ========== REGISTER FUNCTION with bcrypt ==========
    async function handleRegister(event) {
        event.preventDefault();
        
        // Final validation
        if (!validateUsername() || !validatePassword() || !validateConfirmPassword()) {
            showTooltip('Please fix all errors before submitting', 'error');
            return;
        }
        
        const btn = document.getElementById('registerBtn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating account...';
        
        try {
            const firstName = document.getElementById('regFirstName').value;
            const lastName = document.getElementById('regLastName').value;
            const email = document.getElementById('regEmail').value;
            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;
            
            // Check if username exists
            const { data: existingUser } = await supabase
                .from('users')
                .select('username')
                .eq('username', username)
                .maybeSingle();
            
            if (existingUser) {
                showTooltip('Username already taken', 'error');
                btn.disabled = false;
                btn.innerHTML = 'Sign up';
                return;
            }
            
            // Check if email exists
            const { data: existingEmail } = await supabase
                .from('users')
                .select('email')
                .eq('email', email)
                .maybeSingle();
            
            if (existingEmail) {
                showTooltip('Email already registered', 'error');
                btn.disabled = false;
                btn.innerHTML = 'Sign up';
                return;
            }
            
            // Hash password with bcrypt
            const saltRounds = 10;
            const hashedPassword = bcrypt.hashSync(password, saltRounds);
            
            // Create user with hashed password
            const { error } = await supabase
                .from('users')
                .insert([{
                    username: username,
                    email: email,
                    password_hash: hashedPassword,
                    first_name: firstName,
                    last_name: lastName,
                    role: 'client'
                }]);
            
            if (error) throw error;
            
            showTooltip('Registration successful! Please login.', 'success');
            
            // Clear form and switch to login
            setTimeout(() => {
                switchTab('login');
                document.getElementById('registerFormElement').reset();
                // Reset validation states
                document.querySelectorAll('.form-control').forEach(i => i.classList.remove('is-valid', 'is-invalid'));
                document.getElementById('usernameFeedback').innerHTML = '';
                document.getElementById('confirmPasswordFeedback').innerHTML = '';
                ['reqLength', 'reqLower', 'reqUpper', 'reqNumber', 'reqSymbol'].forEach(id => {
                    const el = document.getElementById(id);
                    const text = el.innerHTML.replace(/<i.*?>.*?<\/i>/, '').trim();
                    el.innerHTML = `<i class="fas fa-circle"></i> ${text}`;
                });
                document.getElementById('strengthBar').className = 'strength-bar';
                btn.disabled = true;
                btn.innerHTML = 'Sign up';
            }, 2000);
            
        } catch (error) {
            console.error('Registration error:', error);
            showTooltip('Registration failed: ' + error.message, 'error');
            btn.disabled = false;
            btn.innerHTML = 'Sign up';
        }
    }
    
    // ========== LOGIN FUNCTION with bcrypt ==========
    async function handleLogin(event) {
        event.preventDefault();
        
        const username = document.getElementById('loginUsername').value;
        const password = document.getElementById('loginPassword').value;
        const btn = document.getElementById('loginBtn');
        
        if (!username || !password) {
            showTooltip('Please enter both username/email and password', 'error');
            return;
        }
        
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
        
        try {
            const isEmail = username.includes('@');
            let query = supabase.from('users').select('*');
            
            if (isEmail) {
                query = query.eq('email', username);
            } else {
                query = query.eq('username', username);
            }
            
            const { data: users, error } = await query.maybeSingle();
            
            if (error || !users) {
                showTooltip('User not found', 'error');
                btn.disabled = false;
                btn.innerHTML = 'Log in';
                return;
            }
            
            // Verify with bcrypt
            const isValid = bcrypt.compareSync(password, users.password_hash);
            
            if (!isValid) {
                showTooltip('Invalid password', 'error');
                btn.disabled = false;
                btn.innerHTML = 'Log in';
                return;
            }
            
            showTooltip('Login successful! Redirecting...', 'success');
            
            sessionStorage.setItem('userId', users.user_id);
            sessionStorage.setItem('username', users.username);
            sessionStorage.setItem('role', users.role);
            
            setTimeout(() => {
                if (users.role === 'admin') window.location.href = 'admin.html';
                else if (users.role === 'booster') window.location.href = 'Booster.html';
                else window.location.href = 'Games.html';
            }, 1500);
            
        } catch (error) {
            console.error('Login error:', error);
            showTooltip('Login failed: ' + error.message, 'error');
            btn.disabled = false;
            btn.innerHTML = 'Log in';
        }
    }
    
    // ========== SWITCH BETWEEN LOGIN/REGISTER TABS ==========
    function switchTab(tab) {
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const loginTab = document.getElementById('loginTabBtn');
        const registerTab = document.getElementById('registerTabBtn');
        
        if (tab === 'login') {
            loginForm.style.display = 'block';
            registerForm.style.display = 'none';
            loginTab.classList.add('active');
            registerTab.classList.remove('active');
        } else {
            loginForm.style.display = 'none';
            registerForm.style.display = 'block';
            registerTab.classList.add('active');
            loginTab.classList.remove('active');
        }
    }
    
    // ========== UPDATE NAVBAR BASED ON LOGIN STATUS ==========
    function updateNavbar() {
        const dropdown = document.getElementById('accountDropdown');
        const accountText = document.getElementById('accountText');
        const userId = sessionStorage.getItem('userId');
        const username = sessionStorage.getItem('username');
        const role = sessionStorage.getItem('role');

        if (userId) {
            accountText.textContent = username;
            
            let menuItems = `
                <li><a class="dropdown-item" href="Games.html"><i class="fas fa-gamepad"></i> Games</a></li>
                <li><a class="dropdown-item" href="Orders.html"><i class="fas fa-shopping-bag"></i> My Orders</a></li>
            `;

            if (role === 'booster') {
                menuItems += `<li><a class="dropdown-item" href="Booster.html"><i class="fas fa-bolt"></i> Booster Dashboard</a></li>`;
            }
            if (role === 'admin') {
                menuItems += `<li><a class="dropdown-item" href="admin.html"><i class="fas fa-cog"></i> Admin Panel</a></li>`;
            }

            menuItems += `
                <li><hr class="dropdown-divider"></li>
                <li><a class="dropdown-item" href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            `;

            dropdown.innerHTML = menuItems;
        } else {
            accountText.textContent = 'Account';
            dropdown.innerHTML = `
                <li><a class="dropdown-item" href="LoginAndRegister.html?tab=login"><i class="fas fa-key"></i> Login</a></li>
                <li><a class="dropdown-item" href="LoginAndRegister.html?tab=register"><i class="fas fa-user-plus"></i> Sign Up</a></li>
            `;
        }
    }
    
    // ========== LOGOUT FUNCTION ==========
    function logout() {
        sessionStorage.clear();
        window.location.href = 'index.html';
    }
    
    // ========== WINDOW ONLOAD ==========
    window.onload = function() {
        updateNavbar();
        
        const urlParams = new URLSearchParams(window.location.search);
        const tab = urlParams.get('tab');
        switchTab(tab === 'register' ? 'register' : 'login');
        
        // Add event listeners for validation
        document.getElementById('regFirstName').addEventListener('input', checkRegisterButton);
        document.getElementById('regLastName').addEventListener('input', checkRegisterButton);
        document.getElementById('regEmail').addEventListener('input', checkRegisterButton);
        document.getElementById('regUsername').addEventListener('input', function() {
            validateUsername();
            checkRegisterButton();
        });
        document.getElementById('regPassword').addEventListener('input', function() {
            validatePassword();
            validateConfirmPassword();
            checkRegisterButton();
        });
        document.getElementById('regConfirmPassword').addEventListener('input', function() {
            validateConfirmPassword();
            checkRegisterButton();
        });
        document.getElementById('agreeTerms').addEventListener('change', checkRegisterButton);
        
        // Form submit handlers
        document.getElementById('loginFormElement').onsubmit = handleLogin;
        document.getElementById('registerFormElement').onsubmit = handleRegister;
        
        // Initial button check
        checkRegisterButton();
    };
</script>
