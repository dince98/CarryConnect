<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarryConnect · Login & Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Use jsDelivr instead of Cloudflare (more reliable) -->
    <script src="https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/bcrypt.min.js"></script>
    
    <style>
        /* Your existing styles here - keep them exactly as they were */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: #f8fafc;
            color: #1e293b;
        }
        
        .navbar {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%) !important;
            padding: 1rem 0;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        
        .navbar-brand {
            font-size: 28px !important;
            font-weight: 800 !important;
            color: white !important;
            letter-spacing: -0.5px;
        }
        
        .navbar-brand span {
            color: #3b82f6;
        }
        
        .nav-link {
            color: rgba(255,255,255,0.9) !important;
            font-weight: 600;
            margin: 0 5px;
            padding: 8px 16px !important;
            border-radius: 8px;
        }
        
        .dropdown-menu {
            background: #1e293b;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 8px;
        }
        
        .dropdown-item {
            color: rgba(255,255,255,0.9);
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 8px;
        }
        
        .dropdown-item:hover {
            background: #3b82f6;
            color: white;
        }
        
        .auth-page {
            background: 
                linear-gradient(135deg, rgba(0, 0, 0, 0.5) 0%, rgba(20, 10, 30, 0.6) 100%),
                url('viper.png') center center / cover no-repeat fixed;
            min-height: calc(100vh - 76px - 140px);
            display: flex;
            align-items: center;
            padding: 40px 0;
        }
        
        .auth-card {
            border: none;
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(6px);
            padding: 30px 25px;
            width: 100%;
        }
        
        .auth-tabs {
            display: flex;
            border-bottom: 2px solid #eef2f6;
            margin-bottom: 25px;
        }
        
        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 15px 0;
            font-weight: 700;
            font-size: 18px;
            color: #64748b;
            cursor: pointer;
            border-bottom: 3px solid transparent;
        }
        
        .auth-tab.active {
            color: #667eea;
            border-bottom: 3px solid #667eea;
        }
        
        .form-control {
            border-radius: 16px;
            border: 1.5px solid #e2e8f0;
            padding: 12px 18px;
            font-family: 'Poppins', sans-serif;
        }
        
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102,126,234,0.1);
        }
        
        .form-control.is-valid {
            border-color: #28a745;
        }
        
        .form-control.is-invalid {
            border-color: #dc3545;
        }
        
        .password-wrapper {
            position: relative;
        }
        
        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #64748b;
        }
        
        .validation-feedback {
            font-size: 12px;
            margin-top: 5px;
        }
        
        .validation-feedback small {
            display: block;
            margin-bottom: 2px;
        }
        
        .text-success {
            color: #28a745 !important;
        }
        
        .password-strength {
            height: 4px;
            background: #e2e8f0;
            margin-top: 8px;
            overflow: hidden;
        }
        
        .strength-bar {
            height: 100%;
            width: 0;
            transition: all 0.3s;
        }
        
        .strength-bar.weak {
            width: 25%;
            background: #dc3545;
        }
        
        .strength-bar.medium {
            width: 50%;
            background: #ffc107;
        }
        
        .strength-bar.strong {
            width: 75%;
            background: #28a745;
        }
        
        .strength-bar.very-strong {
            width: 100%;
            background: #20c997;
        }
        
        .tooltip-message {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            border-radius: 12px;
            padding: 12px 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            border-left: 4px solid #667eea;
            z-index: 9999;
            animation: slideIn 0.3s ease;
        }
        
        .tooltip-message.error {
            border-left-color: #dc3545;
        }
        
        @keyframes slideIn {
            from { transform: translateX(30px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .btn-auth {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: 700;
            padding: 14px 20px;
            border-radius: 50px;
            font-size: 18px;
            border: none;
            width: 100%;
        }
        
        .btn-auth:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        footer {
            background: #0f172a;
            color: white;
            padding: 30px 0;
            text-align: center;
        }
        
        .footer-logo {
            font-size: 24px;
            font-weight: 800;
            color: white;
            text-decoration: none;
        }
        
        .footer-logo span {
            color: #667eea;
        }
    </style>
</head>
<body>

<div id="tooltipContainer"></div>

<!-- Navbar (keep your existing navbar) -->
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="index.html"><span>Carry</span>Connect</a>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item dropdown">
                    <a class="nav-link btn-account dropdown-toggle" href="#" data-bs-toggle="dropdown">
                        <i class="fas fa-user-circle"></i> <span id="accountText">Account</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end" id="accountDropdown"></ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Auth Section -->
<div class="auth-page">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6 col-md-8">
                <div class="auth-card">
                    
                    <div class="auth-tabs">
                        <div class="auth-tab active" onclick="switchTab('login')">Login</div>
                        <div class="auth-tab" onclick="switchTab('register')">Sign Up</div>
                    </div>

                    <!-- LOGIN FORM -->
                    <div id="loginForm">
                        <form id="loginFormElement">
                            <div class="mb-3">
                                <label>Username or Email</label>
                                <input type="text" class="form-control" id="loginUsername" required>
                            </div>
                            <div class="mb-3">
                                <label>Password</label>
                                <div class="password-wrapper">
                                    <input type="password" class="form-control" id="loginPassword" required>
                                    <i class="fas fa-eye password-toggle" onclick="togglePassword('loginPassword')"></i>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-auth" id="loginBtn">Log in</button>
                        </form>
                    </div>

                    <!-- REGISTER FORM -->
                    <div id="registerForm" style="display: none;">
                        <form id="registerFormElement">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label>First name</label>
                                    <input type="text" class="form-control" id="regFirstName" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label>Last name</label>
                                    <input type="text" class="form-control" id="regLastName" required>
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label>Email</label>
                                <input type="email" class="form-control" id="regEmail" required>
                            </div>
                            
                            <div class="mb-3">
                                <label>Username <small>(letters only)</small></label>
                                <input type="text" class="form-control" id="regUsername" required>
                                <div class="validation-feedback" id="usernameFeedback"></div>
                            </div>
                            
                            <div class="mb-3">
                                <label>Password</label>
                                <div class="password-wrapper">
                                    <input type="password" class="form-control" id="regPassword" required>
                                    <i class="fas fa-eye password-toggle" onclick="togglePassword('regPassword')"></i>
                                </div>
                                <div class="password-strength">
                                    <div class="strength-bar" id="strengthBar"></div>
                                </div>
                                <div class="validation-feedback" id="passwordFeedback">
                                    <small id="reqLength"><i class="fas fa-circle"></i> 8+ characters</small>
                                    <small id="reqLower"><i class="fas fa-circle"></i> Lowercase</small>
                                    <small id="reqUpper"><i class="fas fa-circle"></i> Uppercase</small>
                                    <small id="reqNumber"><i class="fas fa-circle"></i> Number</small>
                                    <small id="reqSymbol"><i class="fas fa-circle"></i> Symbol</small>
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label>Confirm password</label>
                                <div class="password-wrapper">
                                    <input type="password" class="form-control" id="regConfirmPassword" required>
                                    <i class="fas fa-eye password-toggle" onclick="togglePassword('regConfirmPassword')"></i>
                                </div>
                                <div class="validation-feedback" id="confirmPasswordFeedback"></div>
                            </div>
                            
                            <div class="form-check mb-4">
                                <input class="form-check-input" type="checkbox" id="agreeTerms" required>
                                <label>I agree to the Terms</label>
                            </div>
                            
                            <button type="submit" class="btn btn-auth" id="registerBtn" disabled>Sign up</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer>
    <div class="container">
        <p>© 2026 CarryConnect</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = 'https://aozhkwvoqnyktsgrdtnw.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFvemhrd3ZvcW55a3RzZ3JkdG53Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MjU2NTA1NiwiZXhwIjoyMDg4MTQxMDU2fQ.lbr0-PCymnj241Vwso6yJYzch7HOJ5utB-pPsWpkABc';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    // Simple hash function (works without bcrypt)
    function hashPassword(password) {
        let hash = 0;
        for (let i = 0; i < password.length; i++) {
            const char = password.charCodeAt(i);
            hash = ((hash << 5) - hash) + char;
            hash = hash & hash;
        }
        return 'hash_' + Math.abs(hash).toString(36) + '_' + Date.now();
    }
    
    function showTooltip(msg, type) {
        const tip = document.createElement('div');
        tip.className = `tooltip-message ${type}`;
        tip.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${msg}`;
        document.getElementById('tooltipContainer').appendChild(tip);
        setTimeout(() => tip.remove(), 3000);
    }
    
    function togglePassword(id) {
        const input = document.getElementById(id);
        input.type = input.type === 'password' ? 'text' : 'password';
    }
    
    // Validation functions
    function validateUsername() {
        const val = document.getElementById('regUsername').value;
        const input = document.getElementById('regUsername');
        const feedback = document.getElementById('usernameFeedback');
        
        if (!/^[A-Za-z]+$/.test(val)) {
            input.classList.add('is-invalid');
            feedback.innerHTML = '<small class="text-danger">Letters only</small>';
            return false;
        } else {
            input.classList.add('is-valid');
            feedback.innerHTML = '<small class="text-success">✓ Valid</small>';
            return true;
        }
    }
    
    function validatePassword() {
        const pwd = document.getElementById('regPassword').value;
        const checks = {
            length: pwd.length >= 8,
            lower: /[a-z]/.test(pwd),
            upper: /[A-Z]/.test(pwd),
            number: /[0-9]/.test(pwd),
            symbol: /[!@#$%^&*]/.test(pwd)
        };
        
        updateReq('reqLength', checks.length);
        updateReq('reqLower', checks.lower);
        updateReq('reqUpper', checks.upper);
        updateReq('reqNumber', checks.number);
        updateReq('reqSymbol', checks.symbol);
        
        const strength = Object.values(checks).filter(Boolean).length;
        const bar = document.getElementById('strengthBar');
        bar.className = 'strength-bar';
        if (strength <= 2) bar.classList.add('weak');
        else if (strength === 3) bar.classList.add('medium');
        else if (strength === 4) bar.classList.add('strong');
        else bar.classList.add('very-strong');
        
        return Object.values(checks).every(Boolean);
    }
    
    function updateReq(id, valid) {
        const el = document.getElementById(id);
        el.innerHTML = valid ? 
            '<i class="fas fa-check-circle text-success"></i> ' + el.innerText : 
            '<i class="fas fa-circle text-muted"></i> ' + el.innerText;
    }
    
    function validateConfirm() {
        const pwd = document.getElementById('regPassword').value;
        const confirm = document.getElementById('regConfirmPassword').value;
        const input = document.getElementById('regConfirmPassword');
        const feedback = document.getElementById('confirmPasswordFeedback');
        
        if (pwd !== confirm) {
            input.classList.add('is-invalid');
            feedback.innerHTML = '<small class="text-danger">Passwords do not match</small>';
            return false;
        } else if (confirm) {
            input.classList.add('is-valid');
            feedback.innerHTML = '<small class="text-success">✓ Match</small>';
            return true;
        }
        return false;
    }
    
    function checkButton() {
        const btn = document.getElementById('registerBtn');
        const valid = 
            document.getElementById('regFirstName').value &&
            document.getElementById('regLastName').value &&
            document.getElementById('regEmail').value &&
            validateUsername() &&
            validatePassword() &&
            validateConfirm() &&
            document.getElementById('agreeTerms').checked;
        
        btn.disabled = !valid;
    }
    
    // Register handler
    async function handleRegister(e) {
        e.preventDefault();
        
        if (!validateUsername() || !validatePassword() || !validateConfirm()) {
            showTooltip('Please fix errors', 'error');
            return;
        }
        
        const btn = document.getElementById('registerBtn');
        btn.disabled = true;
        btn.innerHTML = 'Creating...';
        
        try {
            // Check existing
            const { data: existing } = await supabase
                .from('users')
                .select('username, email')
                .or(`username.eq.${document.getElementById('regUsername').value},email.eq.${document.getElementById('regEmail').value}`)
                .maybeSingle();
            
            if (existing) {
                showTooltip('Username or email already exists', 'error');
                btn.disabled = false;
                btn.innerHTML = 'Sign up';
                return;
            }
            
            // Hash and insert
            const { error } = await supabase
                .from('users')
                .insert([{
                    username: document.getElementById('regUsername').value,
                    email: document.getElementById('regEmail').value,
                    password_hash: hashPassword(document.getElementById('regPassword').value),
                    first_name: document.getElementById('regFirstName').value,
                    last_name: document.getElementById('regLastName').value,
                    role: 'client'
                }]);
            
            if (error) throw error;
            
            showTooltip('Registration successful!', 'success');
            setTimeout(() => {
                switchTab('login');
                location.reload();
            }, 1500);
            
        } catch (err) {
            showTooltip('Error: ' + err.message, 'error');
            btn.disabled = false;
            btn.innerHTML = 'Sign up';
        }
    }
    
    // Login handler
    async function handleLogin(e) {
        e.preventDefault();
        
        const username = document.getElementById('loginUsername').value;
        const password = document.getElementById('loginPassword').value;
        const btn = document.getElementById('loginBtn');
        
        btn.disabled = true;
        btn.innerHTML = 'Logging in...';
        
        try {
            const { data: user, error } = await supabase
                .from('users')
                .select('*')
                .or(`username.eq.${username},email.eq.${username}`)
                .maybeSingle();
            
            if (!user || error) {
                showTooltip('User not found', 'error');
                btn.disabled = false;
                btn.innerHTML = 'Log in';
                return;
            }
            
            // Simple hash comparison
            if (hashPassword(password) !== user.password_hash) {
                showTooltip('Invalid password', 'error');
                btn.disabled = false;
                btn.innerHTML = 'Log in';
                return;
            }
            
            sessionStorage.setItem('userId', user.user_id);
            sessionStorage.setItem('username', user.username);
            sessionStorage.setItem('role', user.role);
            
            showTooltip('Login successful!', 'success');
            setTimeout(() => {
                window.location.href = user.role === 'admin' ? 'admin.html' : 
                                      user.role === 'booster' ? 'Booster.html' : 'Games.html';
            }, 1000);
            
        } catch (err) {
            showTooltip('Error: ' + err.message, 'error');
            btn.disabled = false;
            btn.innerHTML = 'Log in';
        }
    }
    
    function switchTab(tab) {
        document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
        document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
    }
    
    // Event listeners
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('loginFormElement').onsubmit = handleLogin;
        document.getElementById('registerFormElement').onsubmit = handleRegister;
        
        ['regFirstName', 'regLastName', 'regEmail', 'regUsername', 'regPassword', 'regConfirmPassword', 'agreeTerms']
            .forEach(id => document.getElementById(id).addEventListener('input', checkButton));
        
        document.getElementById('regUsername').addEventListener('input', validateUsername);
        document.getElementById('regPassword').addEventListener('input', () => {
            validatePassword();
            validateConfirm();
            checkButton();
        });
        document.getElementById('regConfirmPassword').addEventListener('input', () => {
            validateConfirm();
            checkButton();
        });
    });
</script>

</body>
</html>
