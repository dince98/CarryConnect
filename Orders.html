<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders · CarryConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* ... (keep all existing styles) ... */
        
        /* Add these new styles for better image display */
        .receipt-image-thumbnail {
            max-width: 100px;
            max-height: 80px;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid #e2e8f0;
            transition: transform 0.2s;
        }
        
        .receipt-image-thumbnail:hover {
            transform: scale(1.1);
            border-color: #667eea;
        }
        
        .proof-images-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 15px;
        }
        
        .proof-item {
            flex: 1;
            min-width: 150px;
            background: #f8fafc;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }
        
        .proof-item h6 {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #1e293b;
        }
        
        .proof-image {
            width: 100%;
            max-width: 200px;
            border-radius: 10px;
            border: 2px solid #e2e8f0;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .proof-image:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        
        .image-modal {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
            cursor: pointer;
        }
        
        .image-modal-content {
            margin: auto;
            display: block;
            max-width: 90%;
            max-height: 90%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        
        .image-modal-close {
            position: absolute;
            top: 20px;
            right: 35px;
            color: #f1f1f1;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .image-modal-close:hover {
            color: #bbb;
        }
    </style>
</head>
<body>

<!-- Add Image Modal -->
<div id="imageModal" class="image-modal" onclick="closeImageModal()">
    <span class="image-modal-close">&times;</span>
    <img class="image-modal-content" id="modalImage">
</div>

<nav class="navbar navbar-expand-lg navbar-dark">
    <!-- ... (keep navbar same) ... -->
</nav>

<section class="page-header">
    <div class="container">
        <h1>My Orders</h1>
        <p class="lead">Track your boosting orders and payment status</p>
    </div>
</section>

<section class="orders-section">
    <div class="container orders-container">
        <!-- Filter Tabs -->
        <div class="filter-tabs">
            <div class="filter-tab active" onclick="filterOrders('all')" id="filter-all">All Orders</div>
            <div class="filter-tab" onclick="filterOrders('pending')" id="filter-pending">Pending</div>
            <div class="filter-tab" onclick="filterOrders('paid')" id="filter-paid">Paid</div>
            <div class="filter-tab" onclick="filterOrders('verified')" id="filter-verified">Verified</div>
            <div class="filter-tab" onclick="filterOrders('completed')" id="filter-completed">Completed</div>
        </div>

        <!-- Orders List -->
        <div id="ordersList">
            <div class="loading-spinner" id="loadingSpinner">
                <div class="spinner"></div>
                <p>Loading your orders...</p>
            </div>
        </div>
    </div>
</section>

<footer>
    <!-- ... (keep footer same) ... -->
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.min.js"></script>
<script>
    const SUPABASE_URL = 'https://aozhkwvoqnyktsgrdtnw.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFvemhrd3ZvcW55a3RzZ3JkdG53Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MjU2NTA1NiwiZXhwIjoyMDg4MTQxMDU2fQ.lbr0-PCymnj241Vwso6yJYzch7HOJ5utB-pPsWpkABc';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    let allOrders = [];
    let gamesMap = {};
    let paymentsMap = {};
    let boostersMap = {};
    let proofsMap = {};
    let userRole = sessionStorage.getItem('role') || 'client';
    let userId = sessionStorage.getItem('userId');
    
    // Image modal function
    function openImageModal(src) {
        document.getElementById('modalImage').src = src;
        document.getElementById('imageModal').style.display = 'block';
    }
    
    function closeImageModal() {
        document.getElementById('imageModal').style.display = 'none';
    }
    
    function checkRememberedLogin() {
        const remembered = localStorage.getItem('rememberedUser');
        if (remembered && !sessionStorage.getItem('userId')) {
            const user = JSON.parse(remembered);
            sessionStorage.setItem('userId', user.userId);
            sessionStorage.setItem('username', user.username);
            sessionStorage.setItem('role', user.role);
            userRole = user.role;
            userId = user.userId;
        }
    }
    
    function updateNavbar() {
        // ... (keep same)
    }
    
    window.onload = function() {
        checkRememberedLogin();
        if (!userId) {
            window.location.href = 'LoginAndRegister.html?tab=login';
            return;
        }
        loadGames();
        loadBoosters();
        loadOrders();
        updateNavbar();
    };
    
    async function loadGames() {
        try {
            const { data, error } = await supabase
                .from('games')
                .select('*');
            
            if (error) throw error;
            
            data.forEach(game => {
                gamesMap[game.game_id] = game.game_name;
            });
        } catch (error) {
            console.error('Error loading games:', error);
        }
    }
    
    async function loadBoosters() {
        try {
            const { data, error } = await supabase
                .from('users')
                .select('user_id, username')
                .eq('role', 'booster');
            
            if (error) throw error;
            
            data.forEach(booster => {
                boostersMap[booster.user_id] = booster.username;
            });
        } catch (error) {
            console.error('Error loading boosters:', error);
        }
    }
    
    async function loadOrders() {
        try {
            let query = supabase
                .from('orders')
                .select('*')
                .order('order_id', { ascending: false });
            
            if (userRole === 'client') {
                query = query.eq('client_id', userId);
            }
            
            const { data: orders, error: ordersError } = await query;
            
            if (ordersError) throw ordersError;
            
            allOrders = orders || [];
            
            if (allOrders.length > 0) {
                const orderIds = allOrders.map(o => o.order_id);
                
                // Load payments
                const { data: payments, error: paymentsError } = await supabase
                    .from('payments')
                    .select('*')
                    .in('order_id', orderIds);
                
                if (!paymentsError) {
                    payments.forEach(payment => {
                        paymentsMap[payment.order_id] = payment;
                    });
                }
                
                // Load proofs
                const { data: proofs, error: proofsError } = await supabase
                    .from('proofs')
                    .select('*')
                    .in('order_id', orderIds);
                
                if (!proofsError) {
                    proofs.forEach(proof => {
                        if (!proofsMap[proof.order_id]) {
                            proofsMap[proof.order_id] = [];
                        }
                        proofsMap[proof.order_id].push(proof);
                    });
                }
            }
            
            displayOrders(allOrders);
            document.getElementById('loadingSpinner').style.display = 'none';
            
        } catch (error) {
            console.error('Error loading orders:', error);
            document.getElementById('ordersList').innerHTML = `
                <div class="no-orders">
                    <i class="fas fa-exclamation-circle"></i>
                    <h3>Error Loading Orders</h3>
                    <p>${error.message}</p>
                    <button onclick="loadOrders()" class="btn-primary">Try Again</button>
                </div>
            `;
        }
    }
    
    function togglePassword(orderId, password) {
        const passwordSpan = document.getElementById(`password-${orderId}`);
        const passwordHidden = document.getElementById(`password-hidden-${orderId}`);
        
        if (passwordHidden.style.display === 'none') {
            passwordHidden.style.display = 'inline';
            passwordSpan.style.display = 'none';
        } else {
            passwordHidden.style.display = 'none';
            passwordSpan.style.display = 'inline';
        }
    }
    
    function getPaymentHtml(orderId) {
        const payment = paymentsMap[orderId];
        if (!payment) return '';
        
        return `
            <div class="payment-info">
                <h6><i class="fas fa-credit-card"></i> Payment Details</h6>
                <div class="payment-details">
                    <div class="payment-detail">
                        <i class="fas fa-${getPaymentIcon(payment.payment_method)}"></i>
                        <span>${payment.payment_method?.toUpperCase() || 'N/A'}</span>
                    </div>
                    <div class="payment-detail">
                        <i class="fas fa-hashtag"></i>
                        <span>Ref: ${payment.reference_number || 'N/A'}</span>
                    </div>
                    <div class="payment-detail">
                        <i class="fas fa-clock"></i>
                        <span>${payment.created_at ? new Date(payment.created_at).toLocaleString() : 'N/A'}</span>
                    </div>
                    ${payment.receipt_url ? `
                        <div class="payment-detail">
                            <i class="fas fa-image"></i>
                            <img src="${payment.receipt_url}" 
                                 class="receipt-image-thumbnail" 
                                 onclick="openImageModal('${payment.receipt_url}')"
                                 title="Click to view receipt">
                        </div>
                    ` : ''}
                </div>
            </div>
        `;
    }
    
    function getProofsHtml(orderId) {
        const proofs = proofsMap[orderId] || [];
        
        if (proofs.length === 0) return '';
        
        const beforeProof = proofs.find(p => p.proof_type === 'before');
        const afterProof = proofs.find(p => p.proof_type === 'after');
        
        let html = '<div class="proof-section"><h6><i class="fas fa-check-circle" style="color: #10b981;"></i> Proof of Completion</h6>';
        html += '<div class="proof-images-container">';
        
        if (beforeProof) {
            html += `
                <div class="proof-item">
                    <h6>Before</h6>
                    <img src="${beforeProof.image_url}" 
                         class="proof-image" 
                         onclick="openImageModal('${beforeProof.image_url}')"
                         title="Click to enlarge">
                    ${beforeProof.description ? `<p class="proof-description"><small>${beforeProof.description}</small></p>` : ''}
                </div>
            `;
        }
        
        if (afterProof) {
            html += `
                <div class="proof-item">
                    <h6>After</h6>
                    <img src="${afterProof.image_url}" 
                         class="proof-image" 
                         onclick="openImageModal('${afterProof.image_url}')"
                         title="Click to enlarge">
                    ${afterProof.description ? `<p class="proof-description"><small>${afterProof.description}</small></p>` : ''}
                </div>
            `;
        }
        
        html += '</div></div>';
        return html;
    }
    
    function displayOrders(orders) {
        const ordersList = document.getElementById('ordersList');
        
        if (orders.length === 0) {
            ordersList.innerHTML = `
                <div class="no-orders">
                    <i class="fas fa-shopping-bag"></i>
                    <h3>No Orders Yet</h3>
                    <p>You haven't placed any boosting orders yet.</p>
                    <a href="Games.html" class="btn-primary">Browse Games</a>
                </div>
            `;
            return;
        }
        
        let html = '';
        orders.forEach(order => {
            const gameName = gamesMap[order.game_id] || 'Unknown Game';
            const orderDate = new Date(order.order_date).toLocaleDateString();
            const statusClass = getStatusClass(order.status, order.payment_status);
            const boosterName = boostersMap[order.booster_id] || 'Not assigned';
            const paymentHtml = getPaymentHtml(order.order_id);
            const proofsHtml = getProofsHtml(order.order_id);
            
            html += `
                <div class="order-card" data-order-id="${order.order_id}">
                    <div class="order-header">
                        <div class="order-id">
                            Order #${order.order_id}
                            <span>${orderDate}</span>
                        </div>
                        <div class="order-status ${statusClass}">
                            ${getStatusText(order.status, order.payment_status)}
                        </div>
                    </div>
                    
                    <div class="order-details">
                        <div class="detail-item">
                            <span class="detail-label">Game</span>
                            <span class="detail-value">${gameName}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Service</span>
                            <span class="detail-value">${order.notes || 'Standard Boost'}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Rank</span>
                            <span class="detail-value">${order.current_rank || '?'} → ${order.target_rank || '?'}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Total Price</span>
                            <span class="detail-value price">₱${parseInt(order.total_price).toLocaleString()}</span>
                        </div>
                    </div>
                    
                    <!-- Game Account Details -->
                    ${order.game_username ? `
                        <div class="account-info">
                            <h6><i class="fas fa-gamepad"></i> Game Account Details</h6>
                            <div class="account-details">
                                <div class="account-detail">
                                    <i class="fas fa-user"></i>
                                    <span>Username: ${order.game_username}</span>
                                </div>
                                <div class="account-detail">
                                    <i class="fas fa-lock"></i>
                                    <span>Password: 
                                        <span id="password-hidden-${order.order_id}" style="display: none;">${order.game_password}</span>
                                        <span id="password-${order.order_id}" class="password-hidden">••••••••</span>
                                        <button onclick="togglePassword(${order.order_id})" class="btn-show">Show</button>
                                    </span>
                                </div>
                                ${order.additional_info ? `
                                    <div class="account-detail">
                                        <i class="fas fa-info-circle"></i>
                                        <span>${order.additional_info}</span>
                                    </div>
                                ` : ''}
                            </div>
                        </div>
                    ` : ''}
                    
                    ${paymentHtml}
                    
                    ${proofsHtml}
                    
                    ${order.booster_id ? `
                        <div class="payment-info" style="background: #e8f5e9; border-color: #4caf50;">
                            <h6><i class="fas fa-user-ninja"></i> Booster Information</h6>
                            <div class="payment-details">
                                <div class="payment-detail">
                                    <i class="fas fa-user"></i>
                                    <span>Booster: ${boosterName}</span>
                                </div>
                                ${order.assigned_at ? `
                                    <div class="payment-detail">
                                        <i class="fas fa-calendar"></i>
                                        <span>Assigned: ${new Date(order.assigned_at).toLocaleDateString()}</span>
                                    </div>
                                ` : ''}
                            </div>
                        </div>
                    ` : ''}
                </div>
            `;
        });
        
        ordersList.innerHTML = html;
    }
    
    function getStatusClass(orderStatus, paymentStatus) {
        if (paymentStatus === 'unpaid') return 'status-pending';
        if (paymentStatus === 'paid') return 'status-paid';
        if (paymentStatus === 'verified') return 'status-verified';
        if (orderStatus === 'completed') return 'status-completed';
        if (orderStatus === 'cancelled') return 'status-cancelled';
        return 'status-pending';
    }
    
    function getStatusText(orderStatus, paymentStatus) {
        if (paymentStatus === 'unpaid') return 'AWAITING PAYMENT';
        if (paymentStatus === 'paid') return 'PAYMENT RECEIVED';
        if (paymentStatus === 'verified') return 'PAYMENT VERIFIED';
        if (orderStatus === 'assigned') return 'BOOSTER ASSIGNED';
        if (orderStatus === 'in_progress') return 'BOOST IN PROGRESS';
        if (orderStatus === 'completed') return 'COMPLETED';
        if (orderStatus === 'cancelled') return 'CANCELLED';
        return orderStatus.toUpperCase();
    }
    
    function getPaymentIcon(method) {
        switch(method) {
            case 'gcash': return 'mobile-alt';
            case 'maya': return 'wallet';
            case 'bank': return 'university';
            default: return 'credit-card';
        }
    }
    
    function filterOrders(filter) {
        document.querySelectorAll('.filter-tab').forEach(tab => {
            tab.classList.remove('active');
        });
        document.getElementById(`filter-${filter}`).classList.add('active');
        
        if (filter === 'all') {
            displayOrders(allOrders);
            return;
        }
        
        const filtered = allOrders.filter(order => {
            if (filter === 'pending') return order.payment_status === 'unpaid';
            if (filter === 'paid') return order.payment_status === 'paid';
            if (filter === 'verified') return order.payment_status === 'verified';
            if (filter === 'completed') return order.status === 'completed';
            return false;
        });
        
        displayOrders(filtered);
    }
    
    function logout() {
        sessionStorage.clear();
        localStorage.removeItem('rememberedUser');
        window.location.href = 'index.html';
    }
</script>

</body>
</html>
